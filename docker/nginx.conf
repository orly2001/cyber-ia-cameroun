# Service statique du frontend SOC (dashboard + console).
# Le JavaScript appelle l'API directement sur http://localhost:8000
# (port publie par le service `api`) ; le CORS de l'API autorise WEB_PORT.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des actifs texte.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # En-tetes de securite basiques cote frontend.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;

    # Sante du conteneur web.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Pages statiques (index.html, console.html, assets).
    location / {
        try_files $uri $uri/ =404;
    }
}
