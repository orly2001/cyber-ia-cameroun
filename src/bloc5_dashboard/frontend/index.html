<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOC — IA & Cybersécurité Cameroun</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1c2230;
      --border: #2a313c;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2f81f7;
      --critical: #f85149;
      --high: #f0883e;
      --medium: #d29922;
      --low: #3fb950;
      --info: #58a6ff;
      --ok: #238636;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px 24px;
      background: linear-gradient(90deg, #11161f, #161b22);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: 0.4px;
    }
    header h1 .dot {
      color: var(--low);
      margin-right: 8px;
    }
    .actions { display: flex; gap: 10px; align-items: center; }
    button {
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover { background: #283041; border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { background: #1f6feb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

    #banner {
      display: none;
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--high);
      background: rgba(240, 136, 62, 0.12);
      color: var(--high);
      font-size: 13px;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .kpi {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .kpi .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi .value { font-size: 30px; font-weight: 700; margin-top: 6px; }
    .kpi.crit .value { color: var(--critical); }
    .kpi.risk .value { color: var(--high); }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    @media (max-width: 880px) { .charts { grid-template-columns: 1fr; } }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .card h2 { font-size: 14px; margin: 0 0 12px; color: var(--muted); font-weight: 600; }
    .chart-wrap { position: relative; height: 240px; }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; font-size: 13px; }
    thead th {
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    tbody tr { border-bottom: 1px solid #20262f; }
    tbody tr:hover { background: var(--panel-2); }

    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .sev-CRITICAL { background: rgba(248,81,73,0.18); color: var(--critical); }
    .sev-HIGH { background: rgba(240,136,62,0.18); color: var(--high); }
    .sev-MEDIUM { background: rgba(210,153,34,0.18); color: var(--medium); }
    .sev-LOW { background: rgba(63,185,80,0.18); color: var(--low); }
    .sev-INFO { background: rgba(88,166,255,0.18); color: var(--info); }

    .st-NEW { color: var(--info); }
    .st-ACKNOWLEDGED { color: var(--medium); }
    .st-RESOLVED { color: var(--low); }
    .st-FALSE_POSITIVE { color: var(--muted); }

    .risk-cell { font-weight: 700; }
    .row-actions button { padding: 5px 9px; font-size: 12px; }

    .table-card { margin-top: 0; }
    .empty { text-align: center; color: var(--muted); padding: 30px; }
    footer { text-align: center; color: var(--muted); font-size: 12px; padding: 18px; }
  </style>
</head>
<body>
  <header>
    <h1><span class="dot">&#9679;</span>SOC — IA &amp; Cybersécurité Cameroun</h1>
    <div class="actions">
      <span id="conn-status" style="color: var(--muted); font-size: 12px;"></span>
      <button id="btn-refresh" onclick="refreshAll()">Rafraîchir</button>
      <a href="console.html" style="color:#3b82f6;text-decoration:none;font-size:13px;margin-right:6px">Console d'analyse &#8594;</a>
      <button id="btn-demo" class="primary" onclick="runDemo()">Lancer la démo</button>
    </div>
  </header>

  <main>
    <div id="banner"></div>

    <section class="kpis">
      <div class="kpi"><div class="label">Total alertes</div><div class="value" id="kpi-total">—</div></div>
      <div class="kpi crit"><div class="label">Alertes critiques</div><div class="value" id="kpi-crit">—</div></div>
      <div class="kpi risk"><div class="label">Risque moyen</div><div class="value" id="kpi-risk">—</div></div>
    </section>

    <section class="charts">
      <div class="card">
        <h2>Répartition par sévérité</h2>
        <div class="chart-wrap"><canvas id="chart-severity"></canvas></div>
      </div>
      <div class="card">
        <h2>Alertes par statut</h2>
        <div class="chart-wrap"><canvas id="chart-status"></canvas></div>
      </div>
    </section>

    <section class="card table-card">
      <h2>Alertes</h2>
      <table>
        <thead>
          <tr>
            <th>Titre</th>
            <th>Sévérité</th>
            <th>Risque</th>
            <th>Statut</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="alerts-body">
          <tr><td colspan="6" class="empty">Chargement…</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <footer>Projet tutoré — IA &amp; Cybersécurité Cameroun · Bloc 5 Dashboard SOC</footer>

  <script>
    // ====== Configuration ======
    const API_BASE = "http://localhost:8000";

    // Couleurs cohérentes avec les sévérités / statuts
    const SEV_COLORS = {
      CRITICAL: "#f85149", HIGH: "#f0883e", MEDIUM: "#d29922",
      LOW: "#3fb950", INFO: "#58a6ff"
    };
    const STATUS_COLORS = {
      NEW: "#58a6ff", ACKNOWLEDGED: "#d29922",
      RESOLVED: "#3fb950", FALSE_POSITIVE: "#8b949e"
    };
    const SEV_ORDER = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO"];
    const STATUS_ORDER = ["NEW", "ACKNOWLEDGED", "RESOLVED", "FALSE_POSITIVE"];

    let severityChart = null;
    let statusChart = null;

    // ====== Données de démonstration locales (repli hors-ligne) ======
    const DEMO_ALERTS = [
      { id: "demo-1", title: "Campagne phishing MoMo + portail vulnérable", risk_score: 92.4,
        severity: "CRITICAL", status: "NEW", created_at: "2026-06-07T08:12:00Z" },
      { id: "demo-2", title: "SMS frauduleux Orange Money détecté", risk_score: 81.0,
        severity: "HIGH", status: "NEW", created_at: "2026-06-07T07:40:00Z" },
      { id: "demo-3", title: "Service SSH exposé (CVE-2024-1234)", risk_score: 67.5,
        severity: "MEDIUM", status: "ACKNOWLEDGED", created_at: "2026-06-06T19:05:00Z" },
      { id: "demo-4", title: "URL de collecte d'identifiants signalée", risk_score: 74.2,
        severity: "HIGH", status: "NEW", created_at: "2026-06-06T15:22:00Z" },
      { id: "demo-5", title: "En-tête HTTP obsolète sur portail public", risk_score: 33.1,
        severity: "LOW", status: "RESOLVED", created_at: "2026-06-05T11:00:00Z" }
    ];

    let offline = false;

    // ====== Bannière / statut connexion ======
    function setBanner(msg) {
      const b = document.getElementById("banner");
      if (!msg) { b.style.display = "none"; return; }
      b.style.display = "block";
      b.textContent = msg;
    }
    function setConnStatus(ok) {
      const el = document.getElementById("conn-status");
      el.textContent = ok ? "● API connectée" : "● Mode hors-ligne";
      el.style.color = ok ? "var(--low)" : "var(--high)";
    }

    // ====== Appels API ======
    async function apiGet(path) {
      const res = await fetch(API_BASE + path);
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }

    function computeStatsFromAlerts(alerts) {
      const by_severity = {}, by_status = {};
      let sum = 0;
      alerts.forEach(a => {
        by_severity[a.severity] = (by_severity[a.severity] || 0) + 1;
        by_status[a.status] = (by_status[a.status] || 0) + 1;
        sum += a.risk_score;
      });
      const top = [...alerts].sort((x, y) => y.risk_score - x.risk_score).slice(0, 5);
      return {
        total: alerts.length,
        by_severity, by_status,
        average_risk: alerts.length ? +(sum / alerts.length).toFixed(2) : 0,
        top_alerts: top
      };
    }

    // ====== Rendu ======
    function renderKpis(stats) {
      document.getElementById("kpi-total").textContent = stats.total;
      document.getElementById("kpi-crit").textContent = stats.by_severity.CRITICAL || 0;
      document.getElementById("kpi-risk").textContent = (stats.average_risk || 0).toFixed(1);
    }

    function renderSeverityChart(by_severity) {
      const labels = SEV_ORDER.filter(s => by_severity[s]);
      const data = labels.map(s => by_severity[s]);
      const colors = labels.map(s => SEV_COLORS[s]);
      const ctx = document.getElementById("chart-severity");
      if (severityChart) severityChart.destroy();
      severityChart = new Chart(ctx, {
        type: "doughnut",
        data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: "#0d1117", borderWidth: 2 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: "bottom", labels: { color: "#e6edf3", padding: 14 } } }
        }
      });
    }

    function renderStatusChart(by_status) {
      const labels = STATUS_ORDER.filter(s => by_status[s] !== undefined);
      const data = labels.map(s => by_status[s] || 0);
      const colors = labels.map(s => STATUS_COLORS[s]);
      const ctx = document.getElementById("chart-status");
      if (statusChart) statusChart.destroy();
      statusChart = new Chart(ctx, {
        type: "bar",
        data: { labels, datasets: [{ label: "Alertes", data, backgroundColor: colors, borderRadius: 4 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#8b949e" }, grid: { display: false } },
            y: { ticks: { color: "#8b949e", precision: 0 }, grid: { color: "#20262f" }, beginAtZero: true }
          }
        }
      });
    }

    function fmtDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function renderTable(alerts) {
      const body = document.getElementById("alerts-body");
      if (!alerts.length) {
        body.innerHTML = '<tr><td colspan="6" class="empty">Aucune alerte.</td></tr>';
        return;
      }
      body.innerHTML = alerts.map(a => `
        <tr>
          <td>${escapeHtml(a.title)}</td>
          <td><span class="badge sev-${a.severity}">${a.severity}</span></td>
          <td class="risk-cell" style="color:${SEV_COLORS[a.severity] || '#fff'}">${a.risk_score.toFixed(1)}</td>
          <td class="st-${a.status}">${a.status}</td>
          <td>${fmtDate(a.created_at)}</td>
          <td class="row-actions">
            <button onclick="updateStatus('${a.id}','ACKNOWLEDGED')" ${offline ? "disabled" : ""}>Acquitter</button>
            <button onclick="updateStatus('${a.id}','RESOLVED')" ${offline ? "disabled" : ""}>Résoudre</button>
          </td>
        </tr>`).join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    // ====== Orchestration ======
    async function refreshAll() {
      try {
        const [alerts, stats] = await Promise.all([
          apiGet("/api/alerts"),
          apiGet("/api/stats")
        ]);
        offline = false;
        setConnStatus(true);
        setBanner("");
        renderKpis(stats);
        renderSeverityChart(stats.by_severity || {});
        renderStatusChart(stats.by_status || {});
        renderTable(alerts);
      } catch (err) {
        // Repli : données de démonstration locales
        offline = true;
        setConnStatus(false);
        setBanner("API injoignable (" + API_BASE + "). Affichage des données de démonstration locales. Vérifiez que le serveur est lancé et que API_BASE est correct.");
        const stats = computeStatsFromAlerts(DEMO_ALERTS);
        renderKpis(stats);
        renderSeverityChart(stats.by_severity);
        renderStatusChart(stats.by_status);
        renderTable(DEMO_ALERTS);
      }
    }

    async function updateStatus(id, status) {
      if (offline) return;
      try {
        const res = await fetch(API_BASE + "/api/alerts/" + encodeURIComponent(id), {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status })
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        await refreshAll();
      } catch (err) {
        setBanner("Échec de la mise à jour de l'alerte : " + err.message);
      }
    }

    async function runDemo() {
      const btn = document.getElementById("btn-demo");
      btn.disabled = true;
      btn.textContent = "Exécution…";
      try {
        const res = await fetch(API_BASE + "/api/run-demo", { method: "POST" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        if (data.success) {
          setBanner(data.message || "Démo exécutée.");
        } else {
          setBanner("Démo : " + (data.message || "indisponible."));
        }
        await refreshAll();
      } catch (err) {
        setBanner("Impossible de lancer la démo (API injoignable) : " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Lancer la démo";
      }
    }

    // Démarrage
    refreshAll();
  </script>
</body>
</html>
